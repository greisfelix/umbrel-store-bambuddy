description: >-
  BamBuddy ist eine moderne, modulare Kommunikations- und Social-Plattform, die speziell für selbst gehostete Umgebungen entwickelt wurde.

  Sie ermöglicht Chats, Community-Funktionen und Erweiterungen in einem flexiblen System, das sich perfekt in Umbrel-Setups integrieren lässt.

  Der Fokus liegt auf Datenschutz, Kontrolle über eigene Daten und einfacher Erweiterbarkeit durch Module und APIs.

  Ideal für private Netzwerke, Teams oder eigene Plattform-Projekte.
